target-version = "py312"
line-length = 100
extend-exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "build",
  "dist",
  "release",
  "release.staging",
  "release_final",
  "release_fresh",
  "installer-output",
  "data",
]

[lint]
select = ["E4", "E7", "E9", "F", "I", "UP"]

[format]
quote-style = "double"
indent-style = "space"
