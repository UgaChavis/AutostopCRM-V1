services:
  autostopcrm:
    container_name: autostopcrm
    build: .
    restart: always
    extra_hosts:
      - "crm.autostopcrm.ru:host-gateway"
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:41731"
      - "127.0.0.1:8001:41831"
    environment:
      MINIMAL_KANBAN_API_HOST: "0.0.0.0"
      MINIMAL_KANBAN_API_PORT: "41731"
      MINIMAL_KANBAN_MCP_HOST: "0.0.0.0"
      MINIMAL_KANBAN_MCP_PORT: "41831"
      MINIMAL_KANBAN_AGENT_ENABLED: "${MINIMAL_KANBAN_AGENT_ENABLED:-1}"
      MINIMAL_KANBAN_AGENT_BOARD_API_URL: "${MINIMAL_KANBAN_AGENT_BOARD_API_URL:-http://127.0.0.1:41731}"
      MINIMAL_KANBAN_MCP_PATH: "/mcp"
      MINIMAL_KANBAN_MCP_PUBLIC_BASE_URL: "${AUTOSTOP_PUBLIC_BASE_URL:-https://crm.autostopcrm.ru}"
      MINIMAL_KANBAN_MCP_PUBLIC_ENDPOINT_URL: "${AUTOSTOP_PUBLIC_MCP_URL:-https://crm.autostopcrm.ru/mcp}"
      MINIMAL_KANBAN_MCP_ALLOWED_HOSTS: "${AUTOSTOP_MCP_ALLOWED_HOSTS:-}"
      MINIMAL_KANBAN_MCP_ALLOWED_ORIGINS: "${AUTOSTOP_MCP_ALLOWED_ORIGINS:-}"
      AUTOSTOP_MANAGER_PATH: "${AUTOSTOP_MANAGER_CONTAINER_DIR:-/opt/AutostopManager}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
    volumes:
      - "${AUTOSTOP_DATA_DIR:-./data}:/root/.minimal-kanban"
      - "${AUTOSTOP_MANAGER_HOST_DIR:-../AutostopManager}:${AUTOSTOP_MANAGER_CONTAINER_DIR:-/opt/AutostopManager}"
    healthcheck:
      test: ["CMD", "python", "scripts/container_healthcheck.py"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  autostopcrm-telegram-ai:
    container_name: autostopcrm-telegram-ai
    build: .
    restart: always
    command: ["sh", "-lc", "set -a; . /run/telegram-ai.env; exec python main_telegram_ai.py"]
    depends_on:
      autostopcrm:
        condition: service_healthy
    volumes:
      - "./telegram-ai.env:/run/telegram-ai.env:ro"
      - "${AUTOSTOP_DATA_DIR:-./data}:/root/.minimal-kanban"
    environment:
      AUTOSTOP_CRM_API_BASE_URL: "http://autostopcrm:41731"
